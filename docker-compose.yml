services:
  postgres:
    image: postgres:16-alpine
    container_name: onerous-postgres
    environment:
      POSTGRES_DB: onerous-db
      POSTGRES_USER: usuario-usuario
      POSTGRES_PASSWORD: amominhavida
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  wiremock:
    image: wiremock/wiremock:3.3.1
    container_name: uni-api-mock
    ports:
      - "8081:8080"
    volumes:
      - ./wiremock:/home/wiremock
volumes:
  postgres_data:
