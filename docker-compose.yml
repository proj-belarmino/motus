services:
  postgres:
    image: postgres:16-alpine
    container_name: onerous-postgres
    environment:
      POSTGRES_DB: onerous-db
      POSTGRES_USER: usuario-usuario
      POSTGRES_PASSWORD: amominhavida
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
